<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Community Service Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🤝 Community Service Tracker</h1>

    <!-- ===== ADD A RECORD ===== -->
    <section class="card">
      <h2>Log Service Hours</h2>
      <form id="serviceForm">

        <label for="student_name">Student Name</label>
        <input type="text" id="student_name" name="student_name"
               placeholder="e.g. Maria Garcia" required />

        <!-- ✏️ TASK (ADD CODE): The Student ID field is missing!
             Add an <input> element here for student_id.
             Requirements:
               - type should be "text"
               - id and name must both be "student_id"
               - placeholder: "e.g. 10432"
               - it should be required
             Also add a <label> above it that says "Student ID".
             Look at the Student Name field above for an example. -->
        <label for="student_id">Student ID</label>
          <input type="text" id="student_id" name="student_id"
          placeholder="e.g. 10432" required />     


        <label for="activity_date">Date of Activity</label>
        <input type="date" id="activity_date" name="activity_date" required />

        <label for="hours">Hours Served</label>
        <input type="number" id="hours" name="hours"
               placeholder="e.g. 2.5" min="0.25" step="0.25" required />

        <label for="recipient">Person / Organization Served</label>
        <input type="text" id="recipient" name="recipient"
               placeholder="e.g. Riverside Food Bank" required />

        <button type="submit">Submit Record</button>
      </form>
      <p id="formMessage" class="message"></p>
    </section>

    <!-- ===== VIEW ALL RECORDS ===== -->
    <section class="card">
      <h2>All Records</h2>
      <button id="loadRecordsBtn">Load Records</button>
      <table id="recordsTable" class="hidden">
        <thead>
          <tr>
            <th>Name</th><th>ID</th><th>Date</th>
            <th>Hours</th><th>Recipient</th>
          </tr>
        </thead>
        <tbody id="recordsBody"></tbody>
      </table>
    </section>

    <!-- ===== HOURS REPORT ===== -->
    <section class="card">
      <h2>Hours Report</h2>
      <button id="loadReportBtn">Generate Report</button>
      <table id="reportTable" class="hidden">
        <thead>
          <tr><th>Name</th><th>Student ID</th><th>Total Hours</th></tr>
        </thead>
        <tbody id="reportBody"></tbody>
      </table>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
